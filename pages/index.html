<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Timeline Histórica</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="search-container">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Pesquisar"
  />
</div>

<div class="timeline-container">
  <div class="timeline-scale" id="timeline-scale"></div>
  <div id="timeline" class="timeline-line"></div>
</div>

<div class="main-content">
  <div id="results" class="results-container"></div>

  <div id="content-panel" class="content-panel">
    <div class="content-header">
      <h2 id="content-title"></h2>
      <button id="close-content">✕</button>
    </div>
    <div id="content-body" class="content-body">
      <p>Selecione um evento para ver o conteúdo.</p>
    </div>
  </div>
</div>



<script src="script.js"></script>
</body>
</html>
